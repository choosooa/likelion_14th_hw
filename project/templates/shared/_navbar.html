{% load static %}    

<header class="header">
    <div class="header-left">
        <img src="{% static 'images/icon-logo.png' %}" alt="로고" class="logo">
    </div>
    <div class="header-right">
        {% if user.is_authenticated %}
            {#                로그인 시 보이는 요소 => 로그아웃/마이페이지 버튼#}
            <div>{{ user.username }}님 안녕하세요!</div>
            <div class="auth-links">
                <a href="{% url 'accounts:logout' %}">로그아웃</a>
                <a href="{% url 'users:mypage' request.user.id %}">마이페이지</a>
            </div>
        {% else %}
            {#                로그아웃 시 보이는 요소 => 로그인/회원가입 버튼#}
            <div class="auth-links">
                <a href="{% url 'accounts:login' %}">로그인</a>
                <a href="{% url 'accounts:signup' %}">회원가입</a>
            </div>
        {% endif %}
    </div>
</header>

<nav class="navbar-container">
    <!-- mainpage 링크 연결 -->
    <a class="navbar-link" href="{% url 'mainpage' %}">DGU_likelion_14th</a>
    <!-- secondpage 링크 연결 -->
    <a class="navbar-link" href="{% url 'secondpage' %}">Second Page</a>

    <div class="nav-item {% if request.resolver_match.url_name == 'postpage' %}active{% endif %}">
        <a class="navbar-link" href="{% url 'main:postpage' %}">
            <span class="nav-label">list</span>
        </a>
    </div>

    <div class="nav-item {% if request.resolver_match.url_name == 'new_post' %}active{% endif %}">
        <a class="navbar-link" href="{% url 'main:new_post' %}">
            <span class="nav-label">new_post</span>
        </a>
    </div>

</nav>
